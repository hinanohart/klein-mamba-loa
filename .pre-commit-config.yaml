repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=512]
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: forbid-red-license-deps
        name: forbid RED-license deps in pyproject.toml
        entry: python scripts/license_guard.py --check
        language: system
        files: pyproject\.toml
        pass_filenames: false

      - id: sub-r14-file-length-cap
        name: refuse Python files over 500 LOC (sub-R14 trigger guard)
        entry: python scripts/check_file_lengths.py
        language: system
        files: \.py$
        pass_filenames: false
