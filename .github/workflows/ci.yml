name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (no-torch core path)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,mcp]"

      - name: License guard
        run: python scripts/license_guard.py --check

      - name: File-length guard (sub-R14 cap)
        run: python scripts/check_file_lengths.py

      - name: Ruff
        run: ruff check klein_mamba_loa scripts tests

      - name: Ruff format check
        run: ruff format --check klein_mamba_loa scripts tests

      - name: Mypy (lenient)
        run: |
          mypy klein_mamba_loa --ignore-missing-imports || true

      - name: Pytest (no-torch path)
        run: pytest tests/test_persona_scheme.py tests/test_erasure.py tests/test_runtime_gate.py tests/test_license_guard.py tests/test_commercial_gate.py -q

  torch-tests:
    # SPF Loss core math, persona geometry, and the angular orthogonality
    # metric all need torch. We install the CPU wheel (cheap-ish, ~250 MB)
    # because GitHub Actions has no GPU and skipping these tests would
    # leave the project's central math uncovered in CI.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install (CPU torch + dev)
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install -e ".[dev,mcp]"
      - name: Pytest (torch-gated)
        run: pytest tests/test_pgc_dfm.py tests/test_geometry.py tests/test_disentangle.py -q

  vram-stub-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Dry run
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          python scripts/measure_vram.py --dry-run --tier 1
