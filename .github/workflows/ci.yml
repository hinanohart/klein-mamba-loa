name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (no torch path)
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest pytest-cov
          pip install -e .

      - name: License guard
        run: python scripts/license_guard.py --check

      - name: Ruff
        run: ruff check klein_mamba_loa scripts tests

      - name: Ruff format check
        run: ruff format --check klein_mamba_loa scripts tests

      - name: Pytest (no-torch path)
        run: pytest tests/test_persona_scheme.py tests/test_erasure.py tests/test_runtime_gate.py -q

  vram-stub-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Dry run
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          python scripts/measure_vram.py --dry-run --tier 1
